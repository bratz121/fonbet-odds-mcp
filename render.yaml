services:
  - type: web
    name: fonbet-odds-mcp
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m fonbet_mcp.server
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_SSE_PATH
        value: /sse
      - key: MCP_MESSAGE_PATH
        value: /messages/
      - key: MCP_DNS_REBINDING_PROTECTION
        value: false
      - key: FONBET_BASE_URL
        value: https://line-lb51.bk6bba-resources.com
      - key: FONBET_CURRENT_LINE_PATH
        value: /events/listBase
      - key: FONBET_EVENT_VIEW_PATH
        value: /events/event
      - key: FONBET_SCOPE_MARKET
        value: "1600"
      - key: FONBET_TIMEOUT
        value: "20"
